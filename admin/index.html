  <title>Admin — Retrospectiva ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    input[type=color]{-webkit-appearance:none;border:none;cursor:pointer;padding:0}

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, Fragment } = React;

/* ── SVG ICON ENGINE ── */
const I = ({ d, size = 16, fill = "none", sw = 1.8 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"
    style={{ display: "inline-block", flexShrink: 0, verticalAlign: "middle" }}>
    {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p} />) : <path d={d} />}
  </svg>
);

const IC = {
  Plus:     ({s=16}) => <I size={s} d="M12 5v14M5 12h14"/>,
  Edit:     ({s=16}) => <I size={s} d={["M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7","M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"]}/>,
  Trash:    ({s=16}) => <I size={s} d={["M3 6h18","M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6","M9 6V4h6v2"]}/>,

  Copy:     ({s=16}) => <I size={s} d={["M20 9H11a2 2 0 00-2 2v9a2 2 0 002 2h9a2 2 0 002-2v-9a2 2 0 00-2-2z","M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"]}/>,
  Back:     ({s=16}) => <I size={s} d="M19 12H5M12 19l-7-7 7-7"/>,
  Grip:     ({s=16}) => <I size={s} d={["M9 5h.01M9 12h.01M9 19h.01","M15 5h.01M15 12h.01M15 19h.01"]}/>,
  X:        ({s=16}) => <I size={s} d="M18 6L6 18M6 6l12 12"/>,
  Check:    ({s=16}) => <I size={s} d="M20 6L9 17l-5-5"/>,
  Save:     ({s=16}) => <I size={s} d={["M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z","M17 21v-8H7v8","M7 3v5h8"]}/>,
  Globe:    ({s=16}) => <I size={s} d={["M12 2a10 10 0 100 20A10 10 0 0012 2z","M2 12h20","M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"]}/>,
  Cal:      ({s=16}) => <I size={s} d={["M19 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2z","M16 2v4M8 2v4M3 10h18"]}/>,
  Clock:    ({s=16}) => <I size={s} d={["M12 2a10 10 0 100 20A10 10 0 0012 2z","M12 6v6l4 2"]}/>,
  Music:    ({s=16}) => <I size={s} d={["M9 18V5l12-2v13","M9 18a3 3 0 11-6 0 3 3 0 016 0z","M21 16a3 3 0 11-6 0 3 3 0 016 0z"]}/>,
  Img:      ({s=16}) => <I size={s} d={["M21 19a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v14z","M8.5 9.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z","M21 15l-5-5L5 21"]}/>,
  Layers:   ({s=16}) => <I size={s} d={["M12 2L2 7l10 5 10-5-10-5z","M2 17l10 5 10-5","M2 12l10 5 10-5"]}/>,
  Star:     ({s=16}) => <I size={s} d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2"/>,
  Chev:     ({s=16,up=false}) => <I size={s} d={up?"M18 15l-6-6-6 6":"M6 9l6 6 6-6"}/>,
  Moon:     ({s=16}) => <I size={s} d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>,
  Sun:      ({s=16}) => <I size={s} d={["M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42","M12 8a4 4 0 100 8 4 4 0 000-8z"]}/>,
  Map:      ({s=16}) => <I size={s} d={["M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z","M12 7a3 3 0 100 6 3 3 0 000-6z"]}/>,
  Help:     ({s=16}) => <I size={s} d={["M12 2a10 10 0 100 20A10 10 0 0012 2z","M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3","M12 17h.01"]}/>,
  Film:     ({s=16}) => <I size={s} d={["M19.82 2H4.18A2.18 2.18 0 002 4.18v15.64A2.18 2.18 0 004.18 22h15.64A2.18 2.18 0 0022 19.82V4.18A2.18 2.18 0 0019.82 2z","M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 7h5M17 17h5"]}/>,
  Book:     ({s=16}) => <I size={s} d={["M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z","M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"]}/>,
  File:     ({s=16}) => <I size={s} d={["M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z","M14 2v6h6","M16 13H8M16 17H8M10 9H8"]}/>,
  Upload:   ({s=16}) => <I size={s} d={["M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4","M17 8l-5-5-5 5","M12 3v12"]}/>,
  Palette:  ({s=16}) => <I size={s} d="M12 2C6.48 2 2 6.48 2 12c0 5.52 4.48 10 10 10 1.1 0 2-.9 2-2 0-.54-.21-1.03-.54-1.4-.32-.36-.52-.85-.52-1.35 0-1.1.9-2 2-2h2.36C19.58 15.25 22 12.85 22 10c0-4.42-4.48-8-10-8z"/>,
  Monitor:  ({s=16}) => <I size={s} d={["M20 3H4a1 1 0 00-1 1v12a1 1 0 001 1h16a1 1 0 001-1V4a1 1 0 00-1-1z","M8 21h8","M12 17v4"]}/>,
  Phone:    ({s=16}) => <I size={s} d={["M17 2H7a2 2 0 00-2 2v16a2 2 0 002 2h10a2 2 0 002-2V4a2 2 0 00-2-2z","M12 18h.01"]}/>,
  Link:     ({s=16}) => <I size={s} d={["M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71","M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"]}/>,
  Download: ({s=16}) => <I size={s} d={["M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4","M7 10l5 5 5-5","M12 15V3"]}/>,
  Code:     ({s=16}) => <I size={s} d={["M16 18l6-6-6-6","M8 6l-6 6 6 6"]}/>,
};

/* ── UTILS ── */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const slugify = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g,"").trim().replace(/\s+/g,"-")||"retrospectiva";
const fmtDate = iso => { if(!iso) return "—"; try { return new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"}); } catch{return iso;} };
const timeAgo = iso => { const s=Math.floor((Date.now()-new Date(iso))/1000); if(s<60)return"agora"; if(s<3600)return`há ${Math.floor(s/60)}min`; if(s<86400)return`há ${Math.floor(s/3600)}h`; return`há ${Math.floor(s/86400)}d`; };

/* ── FACTORIES ── */
const SECS = [
  {id:"counter",   label:"Contador de Tempo",  icon:"Clock",  desc:"Quantos dias juntos"},
  {id:"timeline",  label:"Linha do Tempo",      icon:"Cal",    desc:"Momentos especiais"},
  {id:"gallery",   label:"Galeria de Fotos",    icon:"Img",    desc:"Álbum de memórias"},
  {id:"quiz",      label:"Quiz do Casal",       icon:"Help",   desc:"Perguntas divertidas"},
  {id:"music",     label:"Música",              icon:"Music",  desc:"Trilha sonora"},
  {id:"loveLetter",label:"Carta de Amor",       icon:"Book",   desc:"Mensagem especial"},
  {id:"map",       label:"Mapa de Lugares",     icon:"Map",    desc:"Lugares especiais"},
  {id:"video",     label:"Vídeo Final",         icon:"Film",   desc:"Vídeo especial"},
];

const TABS = [
  {id:"basic",    label:"Básico",   icon:"File"},
  {id:"timeline", label:"Timeline", icon:"Cal"},
  {id:"gallery",  label:"Galeria",  icon:"Img"},
  {id:"quiz",     label:"Quiz",     icon:"Help"},
  {id:"music",    label:"Música",   icon:"Music"},
  {id:"design",   label:"Design",   icon:"Palette"},
  {id:"sections", label:"Seções",   icon:"Layers"},
  {id:"publish",  label:"Publicar", icon:"Globe"},
];

const makeRetro = (o={}) => ({
  id:uid(), status:"draft", slug:"", views:0,
  createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(),
  couple:{name1:"",name2:"",nickname:"",startDate:"",matchDate:""},
  content:{title:"Nosso Primeiro Ano ❤️",subtitle:"Uma pequena experiência para a pessoa mais importante da minha vida.",intro:"",finalMessage:"",surpriseText:""},
  timeline:[], gallery:[], quiz:[],
  music:{type:"url",url:"",autoplay:false},
  theme:{primaryColor:"#c9a96e",secondaryColor:"#e8a0a0",bgColor:"#0a0a0f",style:"elegant",font:"cormorant",mode:"dark"},
  sections:{counter:true,timeline:true,gallery:true,quiz:true,music:true,loveLetter:false,map:false,video:false},
  ...o
});

const makeEvent = () => ({id:uid(),title:"",description:"",date:"",location:"",photo:""});
const makeQuiz  = () => ({id:uid(),question:"",options:["","","",""],correct:0,hitMessage:"Acertou! 🥰",missMessage:"Quase! 😄"});

/* ── STORAGE ── */
const STORE_KEY = "retro_admin_v4";
const store = {
  load: () => { try{return JSON.parse(localStorage.getItem(STORE_KEY)||"[]");}catch{return[];} },
  save: d => { try{localStorage.setItem(STORE_KEY,JSON.stringify(d));}catch{} }
};

/* ── SHARED UI ── */
const cs = (...args) => args.filter(Boolean).join(" ");

function Inp({label,value,onChange,placeholder,type="text",rows,className=""}) {
  const Tag = rows?"textarea":"input";
  const base = {background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",color:"rgba(255,255,255,0.85)",width:"100%",borderRadius:12,padding:"11px 16px",fontSize:13,outline:"none",fontFamily:"inherit",display:"block"};
  return (
    <div className={className}>
      {label && <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:4,color:"rgba(255,255,255,0.3)",marginBottom:6}}>{label}</div>}
      <Tag type={type} value={value||""} rows={rows} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={base}
        onFocus={e=>e.target.style.borderColor="rgba(201,169,110,0.45)"}
        onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.09)"}
      />
    </div>
  );
}

function Sw({checked,onChange}) {
  return (
    <button onClick={()=>onChange(!checked)} style={{position:"relative",width:40,height:22,borderRadius:11,background:checked?"#c9a96e":"rgba(255,255,255,0.12)",border:"none",cursor:"pointer",flexShrink:0,transition:"background 0.2s"}}>
      <span style={{position:"absolute",top:3,left:checked?21:3,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}/>
    </button>
  );
}

function Badge({status}) {
  const c = status==="published"?{bg:"rgba(16,185,129,0.1)",color:"#34d399",dot:"#34d399",label:"Publicada"}:{bg:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.35)",dot:"rgba(255,255,255,0.2)",label:"Rascunho"};
  return <span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",borderRadius:20,background:c.bg,fontSize:11,color:c.color,border:`1px solid ${c.dot}44`}}><span style={{width:6,height:6,borderRadius:"50%",background:c.dot,flexShrink:0}}/>{c.label}</span>;
}

function Sec({title,children}) {
  return (
    <div style={{marginBottom:32}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <span style={{fontSize:10,textTransform:"uppercase",letterSpacing:4,color:"rgba(255,255,255,0.22)"}}>{title}</span>
        <div style={{flex:1,height:1,background:"rgba(255,255,255,0.05)"}}/>
      </div>
      {children}
    </div>
  );
}

function Toast({message,type}) {
  const err = type==="error";
  return <div style={{position:"fixed",bottom:32,left:"50%",transform:"translateX(-50%)",zIndex:999,display:"flex",alignItems:"center",gap:12,padding:"12px 22px",borderRadius:16,fontSize:13,color:"#fff",backdropFilter:"blur(20px)",background:err?"rgba(239,68,68,0.12)":"rgba(16,185,129,0.12)",border:`1px solid ${err?"rgba(239,68,68,0.3)":"rgba(16,185,129,0.25)"}`,boxShadow:"0 8px 40px rgba(0,0,0,0.6)",whiteSpace:"nowrap",animation:"fadeIn 0.3s ease"}}><span style={{fontSize:16}}>{err?"✕":"✓"}</span>{message}</div>;
}

/* ── APP ── */
function App() {
  const [retros, setRetros] = useState(()=>store.load());
  const [view, setView] = useState("dashboard");
  const [editId, setEditId] = useState(null);
  const [current, setCurrent] = useState(null);
  const [tab, setTab] = useState("basic");
  const [preview, setPreview] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(()=>{ store.save(retros); },[retros]);

  const showToast = useCallback((msg,type="success")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3000); },[]);

  const handleCreate = ()=>{ setCurrent(makeRetro()); setEditId(null); setTab("basic"); setView("editor"); };
  const handleEdit   = r =>{ setCurrent({...r}); setEditId(r.id); setTab("basic"); setView("editor"); };

  const handleSave = useCallback((status="draft")=>{
    if(!current) return;
    const slug = current.slug || slugify(`${current.couple.name1} e ${current.couple.name2}`);
    const updated = {...current,status,slug,updatedAt:new Date().toISOString()};
    if(editId){ setRetros(p=>p.map(r=>r.id===editId?updated:r)); }
    else { setRetros(p=>[updated,...p]); setEditId(updated.id); }
    setCurrent(updated);
    showToast(status==="published"?"Retrospectiva publicada! 🎉":"Rascunho salvo!");
  },[current,editId,showToast]);

  const handleDelete    = id =>{ setRetros(p=>p.filter(r=>r.id!==id)); showToast("Excluída.","error"); };
  const handleDuplicate = r  =>{ setRetros(p=>[{...r,id:uid(),status:"draft",slug:"",createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},...p]); showToast("Duplicada!"); };

  const update = useCallback((path,value)=>{
    setCurrent(prev=>{
      const next={...prev}; const keys=path.split(".");
      let obj=next;
      for(let i=0;i<keys.length-1;i++){ obj[keys[i]]={...obj[keys[i]]}; obj=obj[keys[i]]; }
      obj[keys[keys.length-1]]=value;
      return next;
    });
  },[]);

  return (
    <div style={{minHeight:"100vh",background:"#08080f",color:"#fff",fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      {view==="dashboard"
        ? <Dashboard retros={retros} onCreate={handleCreate} onEdit={handleEdit} onDelete={handleDelete} onDuplicate={handleDuplicate} onPreview={r=>{setCurrent(r);setPreview(true);}}/>
        : <Editor retro={current} tab={tab} onTabChange={setTab} onUpdate={update} onSave={handleSave} onBack={()=>setView("dashboard")} onPreview={()=>setPreview(true)}/>
      }
      {preview&&current&&<PreviewModal retro={current} onClose={()=>setPreview(false)}/>}
      {toast&&<Toast message={toast.msg} type={toast.type}/>}
    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({retros,onCreate,onEdit,onDelete,onDuplicate,onPreview}) {
  const stats=[
    {v:retros.length,            label:"Total",         emoji:"📋"},
    {v:retros.filter(r=>r.status==="published").length, label:"Publicadas", emoji:"🌐"},
    {v:retros.filter(r=>r.status==="draft").length,     label:"Rascunhos",  emoji:"📝"},
    {v:retros.reduce((a,r)=>a+(r.views||0),0),          label:"Visualizações",emoji:"👁"},
  ];
  return (
    <div style={{minHeight:"100vh"}}>
      <header style={{borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"16px 32px",position:"sticky",top:0,background:"#08080f",zIndex:10}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#c9a96e,#e8a0a0)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>❤</div>
            <div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:400,letterSpacing:0.5}}>Retrospectiva Admin</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:1}}>Painel de Gerenciamento</div>
            </div>
          </div>
          <button onClick={onCreate} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 22px",background:"#c9a96e",border:"none",borderRadius:12,color:"#000",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
            <IC.Plus s={15}/> Nova Retrospectiva
          </button>
        </div>
      </header>
      <main style={{maxWidth:1100,margin:"0 auto",padding:"40px 32px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:48}}>
          {stats.map(s=>(
            <div key={s.label} style={{padding:24,borderRadius:20,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.02)"}}>
              <div style={{fontSize:24,marginBottom:12}}>{s.emoji}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:300,lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:6,letterSpacing:1}}>{s.label}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
          <h2 style={{fontSize:15,fontWeight:500,color:"rgba(255,255,255,0.7)"}}>Suas Retrospectivas</h2>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.2)"}}>{retros.length} no total</span>
        </div>
        {retros.length===0 ? (
          <div style={{textAlign:"center",padding:"80px 0"}}>
            <div style={{fontSize:56,marginBottom:16}}>💝</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:300,color:"rgba(255,255,255,0.5)",marginBottom:8}}>Nenhuma retrospectiva ainda</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.25)",marginBottom:32}}>Crie sua primeira experiência romântica</div>
            <button onClick={onCreate} style={{padding:"12px 32px",background:"#c9a96e",border:"none",borderRadius:12,color:"#000",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Criar agora</button>
          </div>
        ) : (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
            {retros.map(r=><RetroCard key={r.id} retro={r} onEdit={()=>onEdit(r)} onDelete={()=>onDelete(r.id)} onDuplicate={()=>onDuplicate(r)} onPreview={()=>onPreview(r)}/>)}
            <button onClick={onCreate} style={{border:"2px dashed rgba(255,255,255,0.08)",borderRadius:20,padding:32,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,color:"rgba(255,255,255,0.18)",background:"none",cursor:"pointer",minHeight:200,fontFamily:"inherit",transition:"all 0.2s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(201,169,110,0.3)";e.currentTarget.style.color="rgba(201,169,110,0.5)";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.08)";e.currentTarget.style.color="rgba(255,255,255,0.18)";}}
            ><IC.Plus s={24}/><span style={{fontSize:13}}>Nova Retrospectiva</span></button>
          </div>
        )}
      </main>
    </div>
  );
}

  const couple=[retro.couple.name1,retro.couple.name2].filter(Boolean).join(" & ")||"Nova Retrospectiva";
  const sideBtn=(style={})=>({display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px",borderRadius:10,fontSize:12,cursor:"pointer",fontFamily:"inherit",width:"100%",...style});
  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>

            onMouseEnter={e=>e.currentTarget.style.color="rgba(255,255,255,0.6)"}
            onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,0.3)"}
          ><IC.Back s={12}/> Dashboard</button>
          <div style={{fontSize:13,fontWeight:500,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{couple}</div>
          <div style={{marginTop:8}}><Badge status={retro.status}/></div>
        </div>
        <nav style={{flex:1,padding:"10px 8px",overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
          {TABS.map(t=>{
            const Ico=IC[t.icon]; const active=tab===t.id;
            return (
              <button key={t.id} onClick={()=>onTabChange(t.id)}
                style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",borderRadius:12,fontSize:13,textAlign:"left",border:"none",cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s",background:active?"rgba(201,169,110,0.1)":"transparent",color:active?"#c9a96e":"rgba(255,255,255,0.35)",outline:active?"1px solid rgba(201,169,110,0.2)":"none"}}
                onMouseEnter={e=>{if(!active){e.currentTarget.style.background="rgba(255,255,255,0.04)";e.currentTarget.style.color="rgba(255,255,255,0.6)";}}}
                onMouseLeave={e=>{if(!active){e.currentTarget.style.background="transparent";e.currentTarget.style.color="rgba(255,255,255,0.35)";}}}
              >{Ico&&<Ico s={14}/>} {t.label}</button>
            );
          })}
        </nav>
        <div style={{padding:"10px 10px 16px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",gap:6}}>
          <button onClick={onPreview} style={sideBtn({background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.4)"})}><IC.Eye s={13}/> Preview</button>
          <button onClick={()=>save("draft")} disabled={saving} style={sideBtn({background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.09)",color:"rgba(255,255,255,0.55)"})}><IC.Save s={13}/> {saving?"Salvando...":"Salvar Rascunho"}</button>
          <button onClick={()=>save("published")} disabled={saving} style={sideBtn({background:"#c9a96e",border:"none",color:"#000",fontWeight:600})}><IC.Globe s={13}/> Publicar</button>
        </div>
      </aside>
      <main style={{flex:1,overflowY:"auto",background:"#0a0a12"}}>
        <div style={{maxWidth:600,margin:"0 auto",padding:"44px 40px"}} className="fade-in">
          {tab==="basic"    &&<BasicTab    retro={retro} onUpdate={onUpdate}/>}
          {tab==="timeline" &&<TimelineTab retro={retro} onUpdate={onUpdate}/>}
          {tab==="gallery"  &&<GalleryTab  retro={retro} onUpdate={onUpdate}/>}
          {tab==="quiz"     &&<QuizTab     retro={retro} onUpdate={onUpdate}/>}
          {tab==="music"    &&<MusicTab    retro={retro} onUpdate={onUpdate}/>}
          {tab==="design"   &&<DesignTab   retro={retro} onUpdate={onUpdate}/>}
          {tab==="sections" &&<SectionsTab retro={retro} onUpdate={onUpdate}/>}

/* ── TIMELINE TAB ── */
function TimelineTab({retro,onUpdate}) {
  const [exp,setExp]=useState(null);
  const [drag,setDrag]=useState(null);
  const add=()=>{ const e=makeEvent(); onUpdate("timeline",[...retro.timeline,e]); setExp(e.id); };
  const rm=id=>{ onUpdate("timeline",retro.timeline.filter(e=>e.id!==id)); if(exp===id)setExp(null); };
  const upd=(id,k,v)=>onUpdate("timeline",retro.timeline.map(e=>e.id===id?{...e,[k]:v}:e));
  const onDS=i=>setDrag(i);
  const onDO=(e,i)=>{ e.preventDefault(); if(drag===null||drag===i)return; const l=[...retro.timeline]; const[it]=l.splice(drag,1); l.splice(i,0,it); onUpdate("timeline",l); setDrag(i); };
  const uploadPhoto=(id,file)=>{ if(!file)return; const r=new FileReader(); r.onload=e=>upd(id,"photo",e.target.result); r.readAsDataURL(file); };
  const iStyle={borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",overflow:"hidden",background:"rgba(255,255,255,0.02)",transition:"opacity 0.15s"};
  return <div>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:32}}>
      <TabH title="Linha do Tempo" sub={`${retro.timeline.length} evento${retro.timeline.length!==1?"s":""} · Arraste para reordenar`}/>
      <button onClick={add} style={{display:"flex",alignItems:"center",gap:7,padding:"9px 18px",background:"rgba(201,169,110,0.1)",border:"1px solid rgba(201,169,110,0.25)",borderRadius:12,color:"#c9a96e",fontSize:13,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}><IC.Plus s={14}/> Adicionar</button>
    </div>
    {retro.timeline.length===0
      ? <div style={{textAlign:"center",padding:"56px 0",borderRadius:20,border:"2px dashed rgba(255,255,255,0.07)"}}><div style={{fontSize:36,marginBottom:12}}>📅</div><div style={{fontSize:13,color:"rgba(255,255,255,0.25)"}}>Adicione os momentos especiais</div></div>
      : <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {retro.timeline.map((ev,i)=>(
            <div key={ev.id} draggable onDragStart={()=>onDS(i)} onDragOver={e=>onDO(e,i)} onDragEnd={()=>setDrag(null)} style={{...iStyle,opacity:drag===i?0.45:1}}>
              <div onClick={()=>setExp(exp===ev.id?null:ev.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}}>
                <IC.Grip s={14}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title||"Sem título"}</div>
                  {ev.date&&<div style={{fontSize:11,color:"rgba(255,255,255,0.25)",marginTop:1}}>{ev.date}</div>}
                </div>
                {ev.photo&&<div style={{width:28,height:28,borderRadius:8,overflow:"hidden",flexShrink:0}}><img src={ev.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
                <button onClick={e=>{e.stopPropagation();rm(ev.id);}} style={{padding:6,borderRadius:8,background:"none",border:"none",color:"rgba(255,255,255,0.15)",cursor:"pointer"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(239,68,68,0.12)";e.currentTarget.style.color="#f87171";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.color="rgba(255,255,255,0.15)";}}
                ><IC.X s={13}/></button>
                <div style={{color:"rgba(255,255,255,0.2)",transform:exp===ev.id?"rotate(180deg)":"none",transition:"transform 0.2s",display:"flex"}}><IC.Chev s={13}/></div>
              </div>
              {exp===ev.id&&(
                <div style={{padding:"16px 14px 14px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <Inp label="Título" value={ev.title} onChange={v=>upd(ev.id,"title",v)} placeholder="Primeiro Encontro"/>
                    <Inp label="Data" type="date" value={ev.date} onChange={v=>upd(ev.id,"date",v)}/>
                  </div>
                  <Inp label="Local" value={ev.location} onChange={v=>upd(ev.id,"location",v)} placeholder="Nome do lugar"/>
                  <Inp label="Descrição" value={ev.description} onChange={v=>upd(ev.id,"description",v)} placeholder="Descreva este momento..." rows={3}/>
                  <div>
                    <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:4,color:"rgba(255,255,255,0.3)",marginBottom:8}}>Foto</div>
                    {ev.photo
                      ? <div style={{position:"relative",borderRadius:12,overflow:"hidden"}}><img src={ev.photo} style={{width:"100%",height:120,objectFit:"cover",display:"block"}}/><button onClick={()=>upd(ev.id,"photo","")} style={{position:"absolute",top:8,right:8,padding:"5px 7px",background:"rgba(0,0,0,0.7)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer"}}><IC.X s={12}/></button></div>
                      : <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,padding:"22px",border:"2px dashed rgba(255,255,255,0.08)",borderRadius:12,cursor:"pointer"}}><IC.Upload s={18}/><span style={{fontSize:12,color:"rgba(255,255,255,0.25)"}}>Upload de foto</span><input type="file" accept="image/*" style={{display:"none"}} onChange={e=>uploadPhoto(ev.id,e.target.files[0])}/></label>
                    }
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
    }
  </div>;
}

/* ── GALLERY TAB ── */
function GalleryTab({retro,onUpdate}) {
  const ref=useRef(); const [hov,setHov]=useState(null);
  const upload=files=>Array.from(files).forEach(f=>{ const r=new FileReader(); r.onload=e=>onUpdate("gallery",[...retro.gallery,{id:uid(),url:e.target.result,caption:"",isCover:retro.gallery.length===0}]); r.readAsDataURL(f); });
  const rm=id=>{ const f=retro.gallery.filter(p=>p.id!==id); if(f.length&&!f.some(p=>p.isCover))f[0].isCover=true; onUpdate("gallery",f); };
  const setCover=id=>onUpdate("gallery",retro.gallery.map(p=>({...p,isCover:p.id===id})));
  return <div>
    <TabH title="Galeria de Fotos" sub={`${retro.gallery.length} foto${retro.gallery.length!==1?"s":""}  ·  ⭐ = capa`}/>
    <div style={{border:"2px dashed rgba(255,255,255,0.08)",borderRadius:20,padding:"40px 32px",textAlign:"center",cursor:"pointer",marginBottom:24,transition:"border-color 0.2s"}}
      onDrop={e=>{e.preventDefault();upload(e.dataTransfer.files);}} onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="rgba(201,169,110,0.35)";}} onDragLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.08)"}
      onClick={()=>ref.current.click()} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(201,169,110,0.25)"} onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.08)"}
    >
      <div style={{display:"flex",justifyContent:"center",marginBottom:10,color:"rgba(255,255,255,0.18)"}}><IC.Upload s={24}/></div>
      <div style={{fontSize:13,color:"rgba(255,255,255,0.3)"}}>Arraste ou clique para selecionar</div>
      <div style={{fontSize:11,color:"rgba(255,255,255,0.15)",marginTop:6}}>JPG, PNG, WEBP</div>
      <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>upload(e.target.files)}/>
    </div>
    {retro.gallery.length>0&&(
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {retro.gallery.map(p=>(
          <div key={p.id} style={{position:"relative",borderRadius:14,overflow:"hidden",aspectRatio:"1",border:"1px solid rgba(255,255,255,0.07)"}}
            onMouseEnter={()=>setHov(p.id)} onMouseLeave={()=>setHov(null)}>
            <img src={p.url} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
            {hov===p.id&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <button onClick={()=>setCover(p.id)} style={{padding:"8px 10px",borderRadius:10,border:"none",cursor:"pointer",background:p.isCover?"#c9a96e":"rgba(255,255,255,0.2)",color:p.isCover?"#000":"#fff"}}><IC.Star s={13}/></button>
              <button onClick={()=>rm(p.id)} style={{padding:"8px 10px",borderRadius:10,background:"rgba(239,68,68,0.8)",border:"none",color:"#fff",cursor:"pointer"}}><IC.Trash s={13}/></button>
            </div>}
            {p.isCover&&<div style={{position:"absolute",top:8,left:8,padding:"3px 8px",borderRadius:8,background:"#c9a96e",fontSize:10,fontWeight:600,color:"#000"}}>Capa</div>}
          </div>
        ))}
      </div>
    )}
  </div>;
}

/* ── QUIZ TAB ── */
function QuizTab({retro,onUpdate}) {
  const [exp,setExp]=useState(null);
  const add=()=>{ const q=makeQuiz(); onUpdate("quiz",[...retro.quiz,q]); setExp(q.id); };
  const rm=id=>onUpdate("quiz",retro.quiz.filter(q=>q.id!==id));
  const upd=(id,k,v)=>onUpdate("quiz",retro.quiz.map(q=>q.id===id?{...q,[k]:v}:q));
  const updOpt=(id,oi,v)=>onUpdate("quiz",retro.quiz.map(q=>{ if(q.id!==id)return q; const o=[...q.options]; o[oi]=v; return{...q,options:o}; }));
  return <div>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:32}}>
      <TabH title="Quiz do Casal" sub={`${retro.quiz.length} pergunta${retro.quiz.length!==1?"s":""}`}/>
      <button onClick={add} style={{display:"flex",alignItems:"center",gap:7,padding:"9px 18px",background:"rgba(201,169,110,0.1)",border:"1px solid rgba(201,169,110,0.25)",borderRadius:12,color:"#c9a96e",fontSize:13,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}><IC.Plus s={14}/> Adicionar</button>
    </div>
    {retro.quiz.length===0
      ? <div style={{textAlign:"center",padding:"56px 0",borderRadius:20,border:"2px dashed rgba(255,255,255,0.07)"}}><div style={{fontSize:36,marginBottom:12}}>❓</div><div style={{fontSize:13,color:"rgba(255,255,255,0.25)"}}>Adicione perguntas sobre o casal</div></div>
      : <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {retro.quiz.map((q,qi)=>(
            <div key={q.id} style={{borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",overflow:"hidden",background:"rgba(255,255,255,0.02)"}}>
              <div onClick={()=>setExp(exp===q.id?null:q.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}}>
                <span style={{fontFamily:"monospace",fontSize:11,color:"rgba(201,169,110,0.5)"}>#{qi+1}</span>
                <div style={{flex:1,fontSize:13,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.question||"Sem pergunta"}</div>
                <button onClick={e=>{e.stopPropagation();rm(q.id);}} style={{padding:6,borderRadius:8,background:"none",border:"none",color:"rgba(255,255,255,0.15)",cursor:"pointer"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(239,68,68,0.12)";e.currentTarget.style.color="#f87171";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.color="rgba(255,255,255,0.15)";}}
                ><IC.X s={13}/></button>
                <div style={{color:"rgba(255,255,255,0.2)",transform:exp===q.id?"rotate(180deg)":"none",transition:"transform 0.2s",display:"flex"}}><IC.Chev s={13}/></div>
              </div>
              {exp===q.id&&(

}

/* ── PUBLISH TAB ── */
function PublishTab({retro,onUpdate,onSave}) {
  const [copied,setCopied]=useState(false);
  const [showCode,setShowCode]=useState(false);
  const suggested=slugify(`${retro.couple.name1} e ${retro.couple.name2}`);
  const slug=retro.slug||suggested;
  const url=`https://retro.app/r/${slug}`;
  const copy=()=>{ navigator.clipboard?.writeText(url); setCopied(true); setTimeout(()=>setCopied(false),2000); };
  const exportJSON=()=>{ const b=new Blob([JSON.stringify(retro,null,2)],{type:"application/json"}); const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(b),download:`${slug}.json`}); a.click(); };
  const active=Object.values(retro.sections||{}).filter(Boolean).length;

  // Generate APP_DATA string for script.js
  const generateAppData=()=>{
    const d=retro;
    const formatDate=iso=>{ if(!iso)return""; try{const dt=new Date(iso); return dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});}catch{return iso;} };
    const qs=d.quiz.map(q=>`    {
      pergunta: ${JSON.stringify(q.question)},
      opcoes:   ${JSON.stringify(q.options)},
      correta:  ${q.correct},
      acerto:   ${JSON.stringify(q.hitMessage)},
      erro:     ${JSON.stringify(q.missMessage)}
    }`).join(",\n");
    const tl=d.timeline.map(e=>`    {
      titulo:    ${JSON.stringify(e.title)},
      data:      ${JSON.stringify(e.date||formatDate(e.date))},
      descricao: ${JSON.stringify(e.description)},
      foto:      ${JSON.stringify(e.photo||"")}
    }`).join(",\n");
    return `const APP_DATA = {
  casal: {
    meuNome:  ${JSON.stringify(d.couple.name1||"Seu Nome")},
    nomeDela: ${JSON.stringify(d.couple.name2||"Nome Dela")},
    apelido:  ${JSON.stringify(d.couple.nickname||"")}
  },
  datas: {
    matchDate:        ${JSON.stringify(formatDate(d.couple.matchDate))},
    primeiroEncontro: "",
    primeiroBeijo:    "",
    primeiraViajem:   "",
    pedidoNamoro:     ${JSON.stringify(formatDate(d.couple.startDate))},
    nossoAp:          "",
    aniversario1Ano:  ${JSON.stringify(formatDate(d.couple.startDate))}
  },
  textos: {
    subtitulo:       ${JSON.stringify(d.content.subtitle)},
    mensagemInicial: ${JSON.stringify(d.content.intro||"")},
    introducao:      ${JSON.stringify(d.content.intro||"")},
    mensagemFinal:   ${JSON.stringify(d.content.finalMessage||"")},
    localPresenteFinal: ${JSON.stringify(d.content.surpriseText||"")}
  },
  quiz: [
${qs}
  ],
  timeline: [
${tl}
  ],
  motivos: [],
  musicas: { ativada: ${d.music.autoplay}, arquivo: ${JSON.stringify(d.music.url||"")} },
  fotosGerais: { capa: "", fundo: "" }
};`;
  };

  const copyCode=()=>{ navigator.clipboard?.writeText(generateAppData()); };

  return <div>
    <TabH title="Publicação" sub="Configure e compartilhe sua retrospectiva"/>
    <Sec title="Status">
      <div style={{padding:16,borderRadius:14,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.02)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div><div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginBottom:6}}>Status atual</div><Badge status={retro.status}/></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>onSave("draft")} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 16px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:11,color:"rgba(255,255,255,0.55)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}><IC.Save s={12}/> Rascunho</button>
          <button onClick={()=>onSave("published")} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",background:"#c9a96e",border:"none",borderRadius:11,color:"#000",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}><IC.Globe s={12}/> Publicar</button>
        </div>
      </div>
    </Sec>
    <Sec title="URL Personalizada">
      <div style={{display:"flex",border:"1px solid rgba(255,255,255,0.09)",borderRadius:12,overflow:"hidden",background:"rgba(255,255,255,0.04)",marginBottom:10}}>
        <span style={{padding:"12px 14px",fontSize:13,color:"rgba(255,255,255,0.2)",borderRight:"1px solid rgba(255,255,255,0.07)",whiteSpace:"nowrap"}}>retro.app/r/</span>
        <input value={slug} onChange={e=>onUpdate("slug",slugify(e.target.value))} placeholder={suggested} style={{flex:1,background:"transparent",border:"none",padding:"12px 14px",fontSize:13,color:"rgba(255,255,255,0.8)",outline:"none",fontFamily:"inherit"}}/>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:12,background:"rgba(16,185,129,0.05)",border:"1px solid rgba(16,185,129,0.15)"}}>
        <IC.Globe s={12}/><span style={{fontSize:12,color:"#34d399",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{url}</span>
        <button onClick={copy} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:copied?"#34d399":"rgba(52,211,153,0.6)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>
          {copied?<><IC.Check s={11}/> Copiado!</>:<><IC.Copy s={11}/> Copiar</>}
        </button>
      </div>
    </Sec>
    <Sec title="Exportar para o Site">
      <div style={{padding:16,borderRadius:14,border:"1px solid rgba(201,169,110,0.2)",background:"rgba(201,169,110,0.05)",marginBottom:12}}>
        <div style={{fontSize:13,color:"#c9a96e",fontWeight:500,marginBottom:4}}>📋 Gerar APP_DATA para script.js</div>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:12}}>Copie o código abaixo e cole no arquivo script.js substituindo o objeto APP_DATA existente.</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowCode(!showCode)} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 16px",background:"rgba(201,169,110,0.15)",border:"1px solid rgba(201,169,110,0.3)",borderRadius:10,color:"#c9a96e",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}><IC.Code s={12}/> {showCode?"Ocultar":"Ver Código"}</button>
          <button onClick={copyCode} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 16px",background:"#c9a96e",border:"none",borderRadius:10,color:"#000",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}><IC.Copy s={12}/> Copiar Código</button>
        </div>
        {showCode&&<pre style={{marginTop:12,padding:12,background:"rgba(0,0,0,0.4)",borderRadius:10,fontSize:11,color:"rgba(255,255,255,0.6)",overflowX:"auto",maxHeight:300,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{generateAppData()}</pre>}
      </div>
    </Sec>
    <Sec title="Compartilhar">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[
          {label:"WhatsApp",emoji:"💬",action:()=>window.open(`https://wa.me/?text=${encodeURIComponent("Olha nossa retrospectiva! "+url)}`)},
          {label:"Copiar Link",emoji:"🔗",action:copy},
          {label:"Exportar JSON",emoji:"📦",action:exportJSON},
          {label:"Nativo",emoji:"📤",action:()=>navigator.share?.({title:retro.content.title,url})},
        ].map(b=>(
          <button key={b.label} onClick={b.action} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:14,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.02)",cursor:"pointer",fontFamily:"inherit",fontSize:13,color:"rgba(255,255,255,0.5)",transition:"all 0.15s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.14)";e.currentTarget.style.color="rgba(255,255,255,0.8)";e.currentTarget.style.background="rgba(255,255,255,0.04)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.07)";e.currentTarget.style.color="rgba(255,255,255,0.5)";e.currentTarget.style.background="rgba(255,255,255,0.02)";}}
          ><span style={{fontSize:20}}>{b.emoji}</span>{b.label}</button>
        ))}
      </div>
    </Sec>
    <Sec title="Resumo">
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {[{v:retro.views||0,label:"Visualizações",e:"👁"},{v:active,label:"Seções ativas",e:"⚡"},{v:retro.timeline.length,label:"Eventos",e:"📅"},{v:retro.gallery.length,label:"Fotos",e:"🖼"},{v:retro.quiz.length,label:"Perguntas",e:"❓"},{v:retro.status==="published"?"Live":"Off",label:"Status",e:retro.status==="published"?"🟢":"⚪"}].map(s=>(
          <div key={s.label} style={{padding:"16px 12px",borderRadius:14,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.02)",textAlign:"center"}}>
            <div style={{fontSize:20,marginBottom:6}}>{s.e}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:300,color:"#fff"}}>{s.v}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:3}}>{s.label}</div>
          </div>
        ))}
      </div>
    </Sec>
  </div>;

          <span style={{fontSize:13,color:"rgba(255,255,255,0.45)"}}>Prévia — {couple}</span>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{display:"flex",background:"rgba(255,255,255,0.05)",borderRadius:12,padding:4,gap:4}}>
              {[{id:"mobile",Ico:IC.Phone},{id:"desktop",Ico:IC.Monitor}].map(({id,Ico})=>(
                <button key={id} onClick={()=>setDevice(id)} style={{padding:"7px 10px",borderRadius:9,border:"none",background:device===id?"rgba(255,255,255,0.1)":"transparent",color:device===id?"#fff":"rgba(255,255,255,0.3)",cursor:"pointer"}}><Ico s={15}/></button>
              ))}
            </div>
            <button onClick={onClose} style={{padding:"8px 10px",background:"rgba(255,255,255,0.05)",border:"none",borderRadius:10,color:"rgba(255,255,255,0.4)",cursor:"pointer"}}><IC.X s={15}/></button>
          </div>
        </div>
        <div style={{flex:1,overflow:"auto",background:"#05050a",display:"flex",alignItems:"center",justifyContent:"center",padding:40}}>
          {device==="mobile"
            ? <div style={{position:"relative",width:375,height:640,flexShrink:0}}>
                <div style={{position:"absolute",inset:0,border:"8px solid #2a2a3a",borderRadius:48,overflow:"hidden",boxShadow:"0 24px 60px rgba(0,0,0,0.8)"}}>
                  <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:100,height:24,background:"#2a2a3a",borderRadius:"0 0 16px 16px",zIndex:10}}/>
                  <div style={{height:"100%",overflowY:"auto"}}><RetroPreview retro={retro} compact/></div>
                </div>
              </div>
            : <div style={{width:"100%",maxWidth:800,borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",overflow:"hidden",height:520}}>
                <div style={{height:"100%",overflowY:"auto"}}><RetroPreview retro={retro}/></div>
              </div>
          }
        </div>
      </div>
    </div>
  );
}

function RetroPreview({retro,compact}) {
  const gold=retro.theme?.primaryColor||"#c9a96e";
  const rose=retro.theme?.secondaryColor||"#e8a0a0";
  const bg=retro.theme?.bgColor||"#0a0a0f";
  const serif=retro.theme?.font!=="inter"?"'Cormorant Garamond',Georgia,serif":"system-ui,sans-serif";
  const couple=[retro.couple.name1,retro.couple.name2].filter(Boolean).join(" & ")||"Nosso Casal";
  const fmtD=iso=>{ if(!iso)return""; try{return new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"});}catch{return iso;} };
  return (
    <div style={{background:bg,fontFamily:serif,color:"#fff",minHeight:"100%"}}>
      <div style={{minHeight:compact?380:480,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:compact?"48px 24px":"64px 40px",textAlign:"center",background:`linear-gradient(145deg,${bg},#1a0a1a)`}}>
        <div style={{fontSize:9,letterSpacing:10,color:gold,opacity:0.6,marginBottom:20}}>✦ ✦ ✦</div>
        <h1 style={{fontSize:compact?26:38,fontWeight:300,lineHeight:1.2,color:"#fff",margin:"0 0 10px"}}>{retro.content.title||"Nosso Primeiro Ano"}</h1>
        <div style={{fontSize:compact?24:32,color:rose,margin:"0 0 14px"}}>❤</div>
        {retro.content.subtitle&&<p style={{fontSize:compact?12:14,fontStyle:"italic",color:"rgba(255,255,255,0.45)",maxWidth:280,lineHeight:1.6,margin:"0 0 14px"}}>{retro.content.subtitle}</p>}
        {retro.couple.startDate&&<div style={{fontSize:10,letterSpacing:5,color:gold,textTransform:"uppercase",marginBottom:24}}>{fmtD(retro.couple.startDate)}</div>}
        <div style={{padding:"10px 28px",border:`1px solid ${gold}`,borderRadius:50,fontSize:11,letterSpacing:4,textTransform:"uppercase",color:gold}}>Começar</div>
      </div>
      {retro.content.intro&&(
        <div style={{padding:compact?"28px 22px":"40px 36px",textAlign:"center",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
          <p style={{fontStyle:"italic",fontSize:compact?14:17,lineHeight:1.65,color:"rgba(255,255,255,0.65)",maxWidth:380,margin:"0 auto 12px"}}>{retro.content.intro}</p>
          <div style={{fontSize:12,color:gold}}>{couple}</div>
        </div>
      )}
      {retro.sections?.timeline&&retro.timeline.length>0&&(
        <div style={{padding:compact?"22px 18px":"32px 28px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
          <div style={{textAlign:"center",fontSize:9,letterSpacing:6,textTransform:"uppercase",color:"rgba(255,255,255,0.25)",marginBottom:20}}>Nossa História</div>
          {retro.timeline.slice(0,compact?2:3).map(ev=>(
            <div key={ev.id} style={{marginBottom:12,border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:compact?"12px 14px":16,background:"rgba(255,255,255,0.02)"}}>
              {ev.date&&<div style={{fontSize:9,color:gold,letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>{ev.date}</div>}
              <div style={{fontSize:compact?13:15,color:"#fff",marginBottom:4}}>{ev.title}</div>
              {ev.description&&<div style={{fontSize:12,color:"rgba(255,255,255,0.4)",lineHeight:1.5}}>{ev.description.slice(0,80)}{ev.description.length>80?"...":""}</div>}
              {ev.photo&&<img src={ev.photo} style={{width:"100%",borderRadius:10,marginTop:10,height:compact?80:100,objectFit:"cover"}}/>}
            </div>
          ))}
          {retro.timeline.length>(compact?2:3)&&<div style={{textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.18)"}}>+{retro.timeline.length-(compact?2:3)} mais eventos</div>}
        </div>
      )}
      {retro.content.finalMessage&&(
        <div style={{padding:compact?"28px 22px":"40px 36px",textAlign:"center",borderTop:"1px solid rgba(255,255,255,0.05)",background:`linear-gradient(145deg,${bg},#1a0a2a)`}}>
          <div style={{fontSize:22,color:rose,marginBottom:14}}>❤</div>
          <p style={{fontStyle:"italic",fontSize:compact?14:17,color:"rgba(255,255,255,0.65)",lineHeight:1.6,maxWidth:340,margin:"0 auto 12px"}}>{retro.content.finalMessage}</p>
          <div style={{fontSize:10,letterSpacing:4,color:"rgba(255,255,255,0.25)"}}>— {retro.couple.name1}</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
